<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Style Login</title>
    <style>
        
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            background-color: #010101; 
            font-family: 'Sofia Pro', 'Inter', sans-serif;
            color: white;
        }

      
        #login-card {
            background-color: #121212; 
            width: 380px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #2f2f2f;
        }

        #popup {
            display: none; position: fixed; top: 20px;
            background-color: #fe2c55; 
            color: white; padding: 12px 25px;
            border-radius: 4px; font-weight: bold;
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.4);
            z-index: 1000; font-size: 14px;
        }

      
        #quadrado {
            width: 90px; height: 90px;
            border-radius: 50%; overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid #fff;
            box-shadow: 3px 0px 0px #25f4ee, -3px 0px 0px #fe2c55;
        }
        #hot { width: 100%; height: 100%; object-fit: cover; }

        h2 { font-size: 24px; font-weight: 700; margin-bottom: 25px; letter-spacing: -0.5px; }

        .input-group { width: 100%; display: flex; flex-direction: column; gap: 10px; }

        input[type="text"], 
        input[type="password"] {
            width: 100%; padding: 12px 16px;
            background-color: #2f2f2f; 
            border: 1px solid transparent;
            color: white; border-radius: 4px;
            font-size: 15px; outline: none;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus { border-color: #8a8a8a; }

  
        #btnenviar {
            width: 100%; padding: 12px;
            background-color: #fe2c55;
            color: white; border: none;
            border-radius: 4px; font-size: 16px;
            font-weight: 600; cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        #btnenviar:hover { opacity: 0.9; }

        .link-toggle {
            font-size: 14px; color: #efefef;
            cursor: pointer; margin-top: 25px;
        }
        .link-toggle span { color: #fe2c55; font-weight: 600; }
        .link-toggle span:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div id="popup"></div>

    <div id="login-card">
        
        <div id="quadrado">
            <img src="oruam hot.jpeg" id="hot">
        </div>
        
        <h2 id="titulo">Entrar</h2>
        
        <div class="input-group">
            <input type="text" id="inputlogin" placeholder="E-mail ou nome de usuário">
            <input type="password" id="inputsenha" placeholder="Senha">
        </div>
        
        <input type="button" id="btnenviar" value="enviar">
        
        <div class="link-toggle" id="alternar" onclick="modoCadastro()">
            Não tem uma conta? <span>Criar conta</span>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btnenviar');
        const titulo = document.getElementById('titulo');
        const alternarLink = document.getElementById('alternar');
        const popup = document.getElementById('popup');
        
        let modoCriarConta = false;

        function mostrarMensagem(texto) {
            popup.innerText = texto;
            popup.style.display = 'block';
            setTimeout(() => popup.style.display = 'none', 3000);
        }

        function modoCadastro() {
            modoCriarConta = !modoCriarConta;
            if (modoCriarConta) {
                titulo.innerText = "Cadastrar";
                btn.value = "cadastrar";
                alternarLink.innerHTML = "Já tem uma conta? <span>Entrar</span>";
            } else {
                titulo.innerText = "Entrar";
                btn.value = "enviar";
                alternarLink.innerHTML = "Não tem uma conta? <span>Criar conta</span>";
            }
        }

        btn.addEventListener('click', function() {
            const login = document.getElementById('inputlogin').value;
            const senha = document.getElementById('inputsenha').value;

            if (modoCriarConta) {
                if (login && senha) {
                    localStorage.setItem('user_' + login, senha);
                    mostrarMensagem("Conta criada com sucesso! 🔥");
                    modoCadastro();
                } else {
                    mostrarMensagem("Preencha todos os campos!");
                }
            } else {
                const senhaSalva = localStorage.getItem('user_' + login);
                if ((login === "Caga" && senha === "Grosso") || (senhaSalva === senha && senha !== null)) {
                    window.location.href = "https://merecidomb.vercel.app";
                } else {
                    mostrarMensagem("menor hot senha errada");
                }
            }
        });

        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') btn.click(); });
    </script>
</body>
</html>
